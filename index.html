<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
		<title>QR генератор ✦</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
		<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
			rel="stylesheet" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family:
					'Inter',
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif;
			}
			body {
				background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
				min-height: 100vh;
				display: flex;
				align-items: flex-start;
				justify-content: center;
				padding: 0.5rem;
			}
			.login-container {
				background: rgba(255, 255, 255, 0.75);
				backdrop-filter: blur(14px);
				-webkit-backdrop-filter: blur(14px);
				border-radius: 2rem;
				box-shadow: 0 25px 45px -12px rgba(0, 20, 40, 0.35);
				padding: 2rem 1.5rem;
				width: 100%;
				max-width: 400px;
				border: 1px solid rgba(255, 255, 255, 0.5);
				text-align: center;
				margin: 1rem auto;
			}
			.login-container h1 {
				font-size: 2rem;
				font-weight: 600;
				background: linear-gradient(135deg, #1d2b3e, #2c3f5c);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				margin-bottom: 0.5rem;
			}
			.login-sub {
				color: #4a5f7a;
				margin-bottom: 1.5rem;
				font-weight: 500;
				font-size: 0.95rem;
			}
			.login-field {
				width: 100%;
				padding: 1rem 1.5rem;
				background: white;
				border: 1.5px solid rgba(200, 215, 235, 0.7);
				border-radius: 3rem;
				font-size: 1rem;
				margin-bottom: 1rem;
				outline: none;
				transition: 0.15s;
				-webkit-appearance: none;
			}
			.login-field:focus {
				border-color: #5b8ed1;
				box-shadow: 0 6px 14px rgba(70, 130, 200, 0.2);
			}
			.login-btn {
				background: #1f3c68;
				border: none;
				border-radius: 3rem;
				padding: 1rem 2rem;
				font-weight: 600;
				font-size: 1.1rem;
				color: white;
				cursor: pointer;
				width: 100%;
				box-shadow: 0 12px 18px -10px #1f3c68;
				transition: all 0.2s;
				margin-top: 0.5rem;
				-webkit-tap-highlight-color: transparent;
			}
			.login-btn:hover {
				background: #254e86;
				transform: translateY(-2px);
			}
			.login-btn:active {
				transform: translateY(0);
			}
			.error-message {
				color: #b83e3e;
				font-size: 0.9rem;
				margin-top: 0.8rem;
				background: rgba(255, 255, 255, 0.6);
				padding: 0.6rem;
				border-radius: 3rem;
			}

			.main-app {
				display: none;
				width: 100%;
				max-width: 600px;
				margin: 0 auto;
			}
			.glass-card {
				background: rgba(255, 255, 255, 0.75);
				backdrop-filter: blur(14px);
				-webkit-backdrop-filter: blur(14px);
				border-radius: 2rem;
				box-shadow:
					0 25px 45px -12px rgba(0, 20, 40, 0.35),
					inset 0 1px 2px rgba(255, 255, 255, 0.6);
				width: 100%;
				padding: 1.2rem 1rem 1.5rem;
				border: 1px solid rgba(255, 255, 255, 0.5);
			}
			h1 {
				font-size: 1.8rem;
				font-weight: 600;
				letter-spacing: -0.02em;
				background: black;
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				margin-bottom: 0.2rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.sub {
				color: #4a5f7a;
				font-weight: 500;
				margin-left: 0.25rem;
				margin-bottom: 1.2rem;
				font-size: 0.9rem;
				border-left: 3px solid #7c9bca;
				padding-left: 0.7rem;
			}

			.auth-bar {
				background: rgba(255, 255, 255, 0.5);
				border-radius: 2rem;
				padding: 0.4rem 0.8rem 0.4rem 1rem;
				display: flex;
				align-items: center;
				justify-content: space-between;
				flex-wrap: wrap;
				gap: 0.5rem;
				margin-bottom: 1.5rem;
				border: 1px solid rgb(207 207 207 / 90%);
				box-shadow: 0 5px 15px -10px #000000;
			}
			.user-info {
				display: flex;
				align-items: center;
				gap: 0.7rem;
			}
			.avatar {
				width: 40px;
				height: 40px;
				background: white;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				color: white;
				font-weight: 600;
				font-size: 1.2rem;
				box-shadow: 0 6px 12px rgba(52, 84, 129, 0.3);
				border: 2px solid white;
				flex-shrink: 0;
			}
			.user-text .name {
				font-size: 1rem;
				color: #000000;
				font-weight: 600;
			}
			.user-text .badge {
				font-size: 0.7rem;
				color: #396083;
				background: rgba(90, 146, 210, 0.2);
				padding: 0.2rem 0.6rem;
				border-radius: 30px;
				display: inline-block;
				margin-top: 2px;
				border: 1px dashed #5d8fc0;
			}
			.logout-btn {
				background: transparent;
				border: 1px solid rgb(207 207 207 / 90%);
				border-radius: 2rem;
				padding: 0.4rem 1rem;
				font-size: 0.8rem;
				font-weight: 500;
				color: #000000;
				cursor: pointer;
				transition: 0.1s;
				-webkit-tap-highlight-color: transparent;
			}
			.logout-btn:active {
				background: rgba(255, 255, 255, 0.8);
			}

			.toolbar {
				display: flex;
				gap: 0.8rem;
				margin-bottom: 1.2rem;
				flex-wrap: wrap;
			}
			.tool-btn {
				background: black;
				border: 1px solid rgb(207 207 207 / 90%);
				box-shadow: 0 5px 15px -10px #000000;
				border-radius: 2rem;
				padding: 0.7rem 1.2rem;
				font-weight: 600;
				font-size: 0.9rem;
				color: #ffffff;
				cursor: pointer;
				transition: 0.15s;
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				flex: 1 1 auto;
				justify-content: center;
				-webkit-tap-highlight-color: transparent;
			}
			.tool-btn:active {
				background: #c7c7c7;
				color: #000;
				transform: translateY(-1px);
			}

			.constructor {
				display: flex;
				flex-direction: column;
				gap: 1.2rem;
				margin-bottom: 1.8rem;
			}

			.input-panel {
				background: rgba(255, 255, 255, 0.5);
				border-radius: 1.5rem;
				padding: 1.2rem 1rem;
				box-shadow:
					inset 0 1px 4px rgba(255, 255, 255, 0.8),
					0 6px 12px rgba(0, 0, 0, 0.04);
			}
			.input-panel label {
				font-weight: 600;
				font-size: 0.8rem;
				color: #000000;
				display: block;
				margin-bottom: 0.3rem;
				margin-left: 0.3rem;
			}
			.field {
				width: 100%;
				padding: 0.8rem 1.2rem;
				background: white;
				border: 1.5px solid rgba(200, 215, 235, 0.7);
				border-radius: 1.8rem;
				font-size: 0.95rem;
				margin-bottom: 1rem;
				outline: none;
				-webkit-appearance: none;
				border: 1px solid rgb(207 207 207 / 90%);
				box-shadow: 0 5px 15px -10px #000000;
			}
			.qr-options {
				display: flex;
				flex-direction: column;

				flex-wrap: wrap;
				margin: 0rem 0 0.5rem;
			}
			.qr-options label {
				margin-right: 0;
			}
			.size-select {
				background: white;
				border-radius: 1.8rem;
				padding: 0.5rem 1rem;
				font-weight: 500;
				font-size: 0.9rem;
				color: black;
				flex: 1;
				border: 1px solid rgb(207 207 207 / 90%);
				box-shadow: 0 5px 15px -10px #000000;
			}
			.generate-btn {
				background: #000000;
				border: none;
				border-radius: 2rem;
				padding: 0.8rem 1.5rem;
				font-weight: 600;
				font-size: 1rem;
				color: white;
				cursor: pointer;
				box-shadow: 0 5px 15px -10px #000000;

				transition: all 0.2s;
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				width: 100%;
				justify-content: center;
				-webkit-tap-highlight-color: transparent;
			}
			.generate-btn:active {
				background: #c7c7c7;
				color: #000;
				transform: translateY(-1px);
			}

			.qr-preview {
				background: white;
				border-radius: 1.5rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 1.2rem 0.8rem;
				box-shadow: 0 18px 30px -12px rgba(31, 60, 100, 0.3);
			}
			#qr-container {
				background: white;
				padding: 0.8rem;
				border-radius: 1.5rem;
				box-shadow:
					inset 0 0 0 1px rgba(0, 0, 0, 0.05),
					0 12px 22px -10px #7d9bc0;
				margin-bottom: 0.8rem;
				display: flex;
				justify-content: center;
				min-height: 180px;
				align-items: center;
				width: 100%;
			}
			#qr-container div {
				display: flex;
				justify-content: center;
				width: 100%;
			}
			#qr-container canvas,
			#qr-container img {
				max-width: 100%;
				height: auto;
				border-radius: 1rem;
			}
			.qr-placeholder {
				width: 160px;
				height: 160px;
				background: #d8d6d6;
				border-radius: 1.2rem;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #414040;
				font-weight: 500;
				font-size: 0.9rem;
				text-align: center;
				padding: 1rem;
			}

			.action-buttons {
				display: flex;
				gap: 0.8rem;
				width: 100%;
				flex-wrap: wrap;
			}
			.save-btn,
			.share-btn {
				flex: 1;
				min-width: 120px;
				padding: 0.7rem 0.8rem;
				font-size: 0.9rem;
				border-radius: 2rem;
				font-weight: 600;
				cursor: pointer;
				transition: 0.15s;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.3rem;
				-webkit-tap-highlight-color: transparent;
			}
			.save-btn {
				background: #d8d6d6;
				border: 1px solid white;
				color: #414040;
			}
			.share-btn {
				background: #d8d6d6;
				border: 1px solid white;
				color: #414040;
			}
			.save-btn:not(:disabled):active,
			.share-btn:not(:disabled):active {
				background: #c8d9f0;
				transform: scale(0.98);
			}
			.save-btn:disabled,
			.share-btn:disabled {
				opacity: 0.3;
				cursor: not-allowed;
			}

			.history-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 0.8rem;
				flex-wrap: wrap;
				gap: 0.5rem;
			}
			.history-header h3 {
				font-weight: 600;
				color: #000000;
				font-size: 1.1rem;
			}
			.clear-history {
				background: #000000;
				border: none;
				border-radius: 2rem;
				padding: 0.8rem 1.5rem;
				font-weight: 600;
				font-size: 1rem;
				color: white;
				cursor: pointer;
				box-shadow: 0 5px 15px -10px #000000;

				transition: all 0.2s;
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				width: 100%;
				justify-content: center;
				-webkit-tap-highlight-color: transparent;
			}
			.clear-history:active {
				background: #c7c7c7;
				color: #000;
				transform: translateY(-1px);
			}
			.history-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
				gap: 0.8rem;
				max-height: 250px;
				overflow-y: auto;
				padding: 0.3rem 0.2rem;
			}
			.history-item {
				background: rgba(255, 255, 255, 0.5);
				backdrop-filter: blur(2px);
				-webkit-backdrop-filter: blur(2px);
				border-radius: 1.2rem;
				padding: 0.6rem 0.4rem;
				display: flex;
				flex-direction: column;
				align-items: center;
				border: 1px solid rgba(255, 255, 255, 0.8);
				cursor: pointer;
				transition: 0.1s;
				-webkit-tap-highlight-color: transparent;
			}
			.history-item:active {
				background: white;
				border-color: #9cb9df;
				transform: translateY(-1px);
			}
			.history-qr {
				width: 70px;
				height: 70px;
				background: #fafcff;
				border-radius: 1rem;
				display: flex;
				align-items: center;
				justify-content: center;
				margin-bottom: 0.3rem;
				pointer-events: none;
			}
			.history-qr canvas,
			.history-qr img {
				width: 60px !important;
				height: 60px !important;
				border-radius: 0.7rem;
			}
			.history-label {
				font-size: 0.65rem;
				font-weight: 500;
				color: #000000;
				max-width: 90px;
				overflow: hidden;
				white-space: nowrap;
				text-overflow: ellipsis;
			}
			.history-date {
				font-size: 0.55rem;
				color: #000000;
			}
			.empty-history {
				color: #6d84a8;
				padding: 1rem;
				background: rgba(255, 255, 255, 0.4);
				border-radius: 1.5rem;
				text-align: center;
				font-size: 0.9rem;
				grid-column: 1 / -1;
			}
			.footer-note {
				margin-top: 1.2rem;
				text-align: center;
				color: #6a81a5;
				font-size: 0.7rem;
				border-top: 1px dashed rgba(98, 133, 185, 0.3);
				padding-top: 0.8rem;
			}

			.modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.7);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
				align-items: center;
				justify-content: center;
				z-index: 1000;
				padding: 1rem;
			}
			.modal-content {
				background: rgba(255, 255, 255, 0.95);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				border-radius: 2rem;
				padding: 1.8rem 1.5rem;
				max-width: 450px;
				width: 100%;
				box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.4);
				border: 1px solid rgba(255, 255, 255, 0.8);
				position: relative;
				animation: modalAppear 0.3s ease;
				max-height: 90vh;
				overflow-y: auto;
			}
			@keyframes modalAppear {
				from {
					opacity: 0;
					transform: scale(0.9);
				}
				to {
					opacity: 1;
					transform: scale(1);
				}
			}
			.modal-close {
				position: absolute;
				top: 0.8rem;
				right: 1rem;
				font-size: 2rem;
				cursor: pointer;
				color: #7a8fb0;
				background: none;
				border: none;
				width: 40px;
				height: 40px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 50%;
				-webkit-tap-highlight-color: transparent;
			}
			.modal-close:active {
				background: rgba(0, 0, 0, 0.05);
			}
			.modal-title {
				font-size: 1.4rem;
				font-weight: 600;
				color: #000000;
				margin-bottom: 1.2rem;
				padding-right: 2rem;
			}
			.modal-qr-container {
				background: white;
				padding: 1rem;
				border-radius: 1.5rem;
				display: flex;
				justify-content: center;
				margin-bottom: 1.2rem;
				box-shadow:
					inset 0 2px 10px rgba(0, 0, 0, 0.02),
					0 10px 20px -10px #000000;
			}
			.modal-qr-container canvas,
			.modal-qr-container img {
				max-width: 100%;
				height: auto;
				border-radius: 1rem;
				max-height: 200px;
			}
			.modal-link {
				background: #ffffff;
				border-radius: 1.5rem;
				padding: 0.8rem 1rem;
				word-break: break-all;
				font-size: 0.85rem;
				color: #000000;
				border: 1px solid #808080;
				margin-bottom: 0.8rem;
				font-weight: 500;
			}
			.modal-link-label {
				font-size: 0.75rem;
				color: #000000;
				margin-bottom: 0.2rem;
				margin-left: 0.3rem;
			}
			.modal-caption {
				font-size: 1rem;
				color: #000000;
				background: rgba(255, 255, 255, 0.4);
				border: 1px solid #808080;
				padding: 0.6rem 1.2rem;
				border-radius: 1.5rem;
				font-weight: 500;
				margin-bottom: 0.8rem;
				word-break: break-word;
			}
			.modal-footer {
				display: flex;
				gap: 0.8rem;
				justify-content: flex-end;
				margin-top: 1.2rem;
				flex-wrap: wrap;
			}

			.modal-action-btn,
			.modal-share-btn {
				background: #000000;
				border: none;
				border-radius: 2rem;
				padding: 0.8rem 1.5rem;
				font-weight: 600;
				font-size: 1rem;
				color: white;
				cursor: pointer;
				box-shadow: 0 5px 15px -10px #000000;

				transition: all 0.2s;
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				width: 100%;
				justify-content: center;
				-webkit-tap-highlight-color: transparent;
			}
			.modal-action-btn:active,
			.modal-share-btn:active {
				background: #c7c7c7;
				color: #000;
				transform: translateY(-1px);
			}

			.scanner-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.9);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
				align-items: center;
				justify-content: center;
				z-index: 2000;
				padding: 0.5rem;
			}
			.scanner-container {
				background: rgba(255, 255, 255, 0.1);
				border-radius: 2rem;
				padding: 1.2rem;
				max-width: 500px;
				width: 100%;
				border: 2px solid rgba(255, 255, 255, 0.2);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
			}
			.scanner-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 1rem;
				color: white;
			}
			.scanner-header h3 {
				font-size: 1.4rem;
				font-weight: 600;
			}
			.scanner-close {
				background: none;
				border: none;
				color: white;
				font-size: 2.2rem;
				cursor: pointer;
				width: 44px;
				height: 44px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 50%;
				-webkit-tap-highlight-color: transparent;
			}
			.scanner-close:active {
				background: rgba(255, 255, 255, 0.2);
			}

			.scanner-view {
				position: relative;
				width: 100%;
				border-radius: 1.5rem;
				overflow: hidden;
				box-shadow: 0 20px 40px -10px black;
				background: #000;
			}

			#reader {
				width: 100% !important;
				min-height: 300px;
				border-radius: 1.5rem;
			}

			#reader video {
				width: 100% !important;
				height: auto !important;
				object-fit: cover;
				border-radius: 1.5rem;
			}

			#reader video {
				transform: scaleX(1);
			}

			.scan-result {
				background: rgba(255, 255, 255, 0.9);
				border-radius: 1.5rem;
				padding: 1rem;
				margin-top: 1rem;
				word-break: break-all;
				font-weight: 500;
				font-size: 0.9rem;
			}
			.use-scanned-btn {
				background: #4caf92;
				border: none;
				border-radius: 2rem;
				padding: 0.8rem 1.5rem;
				color: white;
				font-weight: 600;
				cursor: pointer;
				margin-top: 1rem;
				width: 100%;
				transition: 0.15s;
				font-size: 1rem;
				-webkit-tap-highlight-color: transparent;
			}
			.use-scanned-btn:active {
				background: #3e9b80;
				transform: scale(0.98);
			}

			.camera-toggle {
				background: rgba(255, 255, 255, 0.2);
				border: 1px solid rgba(255, 255, 255, 0.3);
				border-radius: 2rem;
				padding: 0.6rem 1.2rem;
				color: white;
				cursor: pointer;
				margin-top: 1rem;
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				transition: 0.15s;
				font-size: 0.9rem;
				width: 100%;
				justify-content: center;
				-webkit-tap-highlight-color: transparent;
			}
			.camera-toggle:active {
				background: rgba(255, 255, 255, 0.3);
			}

			button,
			.history-item,
			.tool-btn {
				touch-action: manipulation;
			}

			@media (max-width: 380px) {
				.glass-card {
					padding: 1rem 0.8rem 1.2rem;
				}
				h1 {
					font-size: 1.5rem;
				}
				.action-buttons {
					flex-direction: column;
				}
				.save-btn,
				.share-btn {
					width: 100%;
				}
				.history-grid {
					grid-template-columns: repeat(2, 1fr);
				}
				.modal-footer {
					flex-direction: column;
				}
				.modal-action-btn,
				.modal-share-btn {
					width: 100%;
				}
			}
		</style>
	</head>
	<body>
		<div id="modalOverlay" class="modal-overlay">
			<div class="modal-content">
				<button class="modal-close" id="modalCloseBtn">&times;</button>
				<div class="modal-title" id="modalTitle">Просмотр QR-кода</div>
				<div id="modalQrContainer" class="modal-qr-container"></div>
				<div class="modal-link-label">🔗 Содержимое:</div>
				<div id="modalLink" class="modal-link"></div>
				<div class="modal-link-label">🏷 Подпись:</div>
				<div id="modalCaption" class="modal-caption"></div>
				<div class="modal-footer">
					<button class="modal-share-btn" id="modalShareBtn">Поделиться</button>
					<button class="modal-action-btn" id="modalUseBtn">
						Использовать
					</button>
				</div>
			</div>
		</div>

		<div id="scannerOverlay" class="scanner-overlay">
			<div class="scanner-container">
				<div class="scanner-header">
					<h3>📷 Сканировать QR</h3>
					<button class="scanner-close" id="scannerCloseBtn">&times;</button>
				</div>

				<div class="scanner-view">
					<div id="reader"></div>
				</div>

				<button class="camera-toggle" id="toggleCameraBtn">
					Переключить камеру
				</button>

				<div id="scanResult" class="scan-result" style="display: none"></div>
				<button
					id="useScannedBtn"
					class="use-scanned-btn"
					style="display: none">
					Использовать результат
				</button>
			</div>
		</div>

		<div id="loginPage" class="login-container">
			<h1>QR Access</h1>
			<div class="login-sub">войдите для создания персональных QR</div>
			<input
				type="text"
				id="loginUsername"
				class="login-field"
				placeholder="Логин"
				value="admin" />
			<input
				type="password"
				id="loginPassword"
				class="login-field"
				placeholder="Пароль"
				value="123" />
			<button class="login-btn" id="loginButton">Войти</button>
			<div id="loginError" class="error-message" style="display: none">
				Неверный логин или пароль
			</div>
			<div style="margin-top: 1.2rem; font-size: 0.8rem; color: #6b85a8">
				используйте admin / 123
			</div>
		</div>

		<div id="mainApp" class="main-app">
			<div class="glass-card">
				<div
					style="
						display: flex;
						justify-content: space-between;
						align-items: baseline;
					">
					<h1>✦ QR PERSCAN</h1>
				</div>
				<div class="sub">создавай, сканируй и делись QR-кодами</div>

				<div class="auth-bar">
					<div class="user-info">
						<div class="avatar" id="adminAvatar">👨‍💼</div>
						<div class="user-text">
							<span class="name" id="adminName">admin</span>
						</div>
					</div>
					<button class="logout-btn" id="logoutButton">Выйти</button>
				</div>

				<div class="toolbar">
					<button class="tool-btn" id="scanBtn">Сканировать QR</button>
				</div>

				<div class="constructor">
					<div class="input-panel">
						<label>Текст / ссылка для создания QR</label>
						<input
							type="text"
							class="field"
							id="qrInput"
							placeholder="https:// или любой текст" />

						<label>Подпись (необязательно)</label>
						<input
							type="text"
							class="field"
							id="qrLabel"
							placeholder="Например, визитка" />

						<div class="qr-options">
							<label> Размер</label>
							<select id="sizeSelect" class="size-select">
								<option value="120">120x120</option>
								<option value="160" selected>160x160</option>
								<option value="200">200x200</option>
								<option value="250">250x250</option>
							</select>
						</div>
						<button class="generate-btn" id="generateBtn">
							Сгенерировать QR
						</button>
					</div>

					<div class="qr-preview">
						<div id="qr-container">
							<div id="qr-placeholder" class="qr-placeholder">
								QR появится здесь
							</div>
						</div>
						<div class="action-buttons">
							<button class="save-btn" id="saveQrBtn" disabled>
								Сохранить
							</button>
							<button class="share-btn" id="shareCurrentBtn" disabled>
								Поделиться
							</button>
						</div>
					</div>
				</div>

				<div class="history-header">
					<h3>История QR</h3>
				</div>
				<div id="historyContainer" class="history-grid"></div>
				<button class="clear-history" id="clearHistoryBtn">Очистить</button>
			</div>
		</div>

		<script>
			;(function () {
				const loginPage = document.getElementById('loginPage')
				const mainApp = document.getElementById('mainApp')
				const loginBtn = document.getElementById('loginButton')
				const loginError = document.getElementById('loginError')
				const usernameField = document.getElementById('loginUsername')
				const passwordField = document.getElementById('loginPassword')
				const logoutBtn = document.getElementById('logoutButton')

				const qrInput = document.getElementById('qrInput')
				const qrLabel = document.getElementById('qrLabel')
				const sizeSelect = document.getElementById('sizeSelect')
				const generateBtn = document.getElementById('generateBtn')
				const saveBtn = document.getElementById('saveQrBtn')
				const shareCurrentBtn = document.getElementById('shareCurrentBtn')
				const qrContainer = document.getElementById('qr-container')
				const historyDiv = document.getElementById('historyContainer')
				const clearHistoryBtn = document.getElementById('clearHistoryBtn')
				const scanBtn = document.getElementById('scanBtn')

				const modalOverlay = document.getElementById('modalOverlay')
				const modalCloseBtn = document.getElementById('modalCloseBtn')
				const modalQrContainer = document.getElementById('modalQrContainer')
				const modalLink = document.getElementById('modalLink')
				const modalCaption = document.getElementById('modalCaption')
				const modalUseBtn = document.getElementById('modalUseBtn')
				const modalShareBtn = document.getElementById('modalShareBtn')
				const modalTitle = document.getElementById('modalTitle')

				const scannerOverlay = document.getElementById('scannerOverlay')
				const scannerCloseBtn = document.getElementById('scannerCloseBtn')
				const scanResult = document.getElementById('scanResult')
				const useScannedBtn = document.getElementById('useScannedBtn')
				const toggleCameraBtn = document.getElementById('toggleCameraBtn')

				let currentQRValue = ''
				let currentQRSize = 160
				let currentQRCodeObj = null
				let history = []
				let currentModalItem = null
				let html5QrCode = null
				let lastScannedText = ''
				let currentCamera = 'environment'

				function checkAuth() {
					const isAuth = sessionStorage.getItem('qr_auth') === 'true'
					if (isAuth) {
						loginPage.style.display = 'none'
						mainApp.style.display = 'block'
						loadHistory()
						setTimeout(() => generateQR(), 50)
					} else {
						loginPage.style.display = 'block'
						mainApp.style.display = 'none'
					}
				}

				loginBtn.addEventListener('click', () => {
					const login = usernameField.value.trim()
					const pass = passwordField.value.trim()

					if (login === 'admin' && pass === '123') {
						sessionStorage.setItem('qr_auth', 'true')
						loginError.style.display = 'none'
						checkAuth()
					} else {
						loginError.style.display = 'block'
					}
				})

				logoutBtn.addEventListener('click', () => {
					sessionStorage.removeItem('qr_auth')
					checkAuth()
					usernameField.value = 'admin'
					passwordField.value = '123'
				})

				function loadHistory() {
					try {
						const stored = localStorage.getItem('qr_history_admin')
						history = stored ? JSON.parse(stored) : []
					} catch (e) {
						history = []
					}
					renderHistory()
				}

				function saveHistoryToStorage() {
					localStorage.setItem('qr_history_admin', JSON.stringify(history))
				}

				function renderHistory() {
					if (!historyDiv) return
					if (history.length === 0) {
						historyDiv.innerHTML =
							'<div class="empty-history">Пока нет сохранённых QR-кодов</div>'
						return
					}
					const sorted = [...history].sort(
						(a, b) => new Date(b.date) - new Date(a.date)
					)
					let html = ''
					sorted.forEach(item => {
						const dateStr = new Date(item.date).toLocaleString('ru-RU', {
							day: '2-digit',
							month: '2-digit',
							hour: '2-digit',
							minute: '2-digit'
						})
						html += `<div class="history-item" data-id="${item.id}">
                        <div class="history-qr" id="hist-qr-${item.id}"></div>
                        <span class="history-label" title="${item.label || item.value}">${item.label || item.value.substring(0, 15)}${item.value.length > 15 ? '…' : ''}</span>
                        <span class="history-date">${dateStr}</span>
                    </div>`
					})
					historyDiv.innerHTML = html

					sorted.forEach(item => {
						const container = document.getElementById(`hist-qr-${item.id}`)
						if (container) {
							try {
								container.innerHTML = ''
								new QRCode(container, {
									text: item.value,
									width: 60,
									height: 60,
									colorDark: '#1f3857',
									colorLight: '#ffffff',
									correctLevel: QRCode.CorrectLevel.M
								})
							} catch (e) {
								container.innerText = '⛔'
							}
						}
					})

					document.querySelectorAll('.history-item').forEach(item => {
						item.addEventListener('click', e => {
							const id = Number(item.dataset.id)
							const found = history.find(h => h.id === id)
							if (found) {
								openModal(found)
							}
						})
					})
				}

				function generateQR() {
					const text = qrInput.value.trim()
					if (!text) {
						return
					}
					currentQRValue = text
					currentQRSize = parseInt(sizeSelect.value, 10)
					qrContainer.innerHTML = ''
					const newQrDiv = document.createElement('div')
					newQrDiv.id = 'qr-live'
					qrContainer.appendChild(newQrDiv)

					try {
						currentQRCodeObj = new QRCode(newQrDiv, {
							text: text,
							width: currentQRSize,
							height: currentQRSize,
							colorDark: '#1c2f4c',
							colorLight: '#ffffff',
							correctLevel: QRCode.CorrectLevel.H
						})
						saveBtn.disabled = false
						shareCurrentBtn.disabled = false
					} catch (e) {
						qrContainer.innerHTML =
							'<div class="qr-placeholder">Ошибка генерации</div>'
						saveBtn.disabled = true
						shareCurrentBtn.disabled = true
					}
				}

				function saveCurrentQrToHistory() {
					if (!currentQRValue) {
						alert('Сгенерируйте QR')
						return
					}
					const label = qrLabel.value.trim() || currentQRValue.substring(0, 30)
					const newEntry = {
						id: Date.now() + Math.floor(Math.random() * 1000),
						value: currentQRValue,
						label: label,
						size: currentQRSize,
						date: new Date().toISOString(),
						user: 'admin'
					}
					history.push(newEntry)
					saveHistoryToStorage()
					renderHistory()
				}

				function clearHistory() {
					if (history.length > 0 && confirm('Удалить всю историю?')) {
						history = []
						saveHistoryToStorage()
						renderHistory()
					}
				}

				function shareCurrent() {
					if (!currentQRValue) return

					if (navigator.share) {
						navigator
							.share({
								title: 'Мой QR-код',
								text: qrLabel.value || currentQRValue,
								url: currentQRValue.startsWith('http')
									? currentQRValue
									: undefined
							})
							.catch(() => {
								fallbackShare()
							})
					} else {
						fallbackShare()
					}
				}

				function fallbackShare() {
					const tempItem = {
						value: currentQRValue,
						label: qrLabel.value || 'Текущий QR',
						size: currentQRSize
					}
					openModal(tempItem, true)
				}

				function openModal(item, isCurrent = false) {
					currentModalItem = item
					modalTitle.textContent = isCurrent
						? 'Текущий QR-код'
						: 'QR-код из истории'

					modalQrContainer.innerHTML = ''
					const qrDiv = document.createElement('div')
					modalQrContainer.appendChild(qrDiv)

					try {
						new QRCode(qrDiv, {
							text: item.value,
							width: 200,
							height: 200,
							colorDark: '#1c2f4c',
							colorLight: '#ffffff',
							correctLevel: QRCode.CorrectLevel.H
						})
					} catch (e) {
						modalQrContainer.innerHTML =
							'<div style="padding:2rem;">Ошибка загрузки QR</div>'
					}

					modalLink.textContent = item.value
					modalCaption.textContent = item.label || '— без подписи —'

					modalOverlay.style.display = 'flex'
				}

				function closeModal() {
					modalOverlay.style.display = 'none'
					currentModalItem = null
				}

				function useInGenerator() {
					if (currentModalItem) {
						qrInput.value = currentModalItem.value
						qrLabel.value = currentModalItem.label || ''
						const sizeOption = [...sizeSelect.options].find(
							opt => Number(opt.value) === currentModalItem.size
						)
						if (sizeOption) sizeSelect.value = currentModalItem.size
						generateQR()
						closeModal()
					}
				}

				function shareFromModal() {
					if (!currentModalItem) return

					if (navigator.share) {
						navigator
							.share({
								title: 'QR-код',
								text: currentModalItem.label || currentModalItem.value,
								url: currentModalItem.value.startsWith('http')
									? currentModalItem.value
									: undefined
							})
							.catch(() => {
								alert('Скопировано в буфер обмена: ' + currentModalItem.value)
								copyToClipboard(currentModalItem.value)
							})
					} else {
						alert('Скопировано в буфер обмена: ' + currentModalItem.value)
						copyToClipboard(currentModalItem.value)
					}
				}

				function copyToClipboard(text) {
					const textarea = document.createElement('textarea')
					textarea.value = text
					document.body.appendChild(textarea)
					textarea.select()
					document.execCommand('copy')
					document.body.removeChild(textarea)
				}

				async function startScanner() {
					scannerOverlay.style.display = 'flex'
					scanResult.style.display = 'none'
					useScannedBtn.style.display = 'none'
					lastScannedText = ''

					scanResult.style.display = 'block'
					scanResult.textContent = '⏳ Запуск камеры...'

					if (html5QrCode) {
						try {
							await html5QrCode.stop()
						} catch (e) {}
					}

					html5QrCode = new Html5Qrcode('reader')

					const config = {
						fps: 10,
						qrbox: { width: 200, height: 200 },
						aspectRatio: 1.0
					}

					try {
						await html5QrCode.start(
							{ facingMode: currentCamera },
							config,
							onScanSuccess,
							onScanError
						)

						const videoElement = document.querySelector('#reader video')
						if (videoElement) {
							if (currentCamera === 'user') {
								videoElement.style.transform = 'scaleX(-1)'
							} else {
								videoElement.style.transform = 'scaleX(1)'
							}
						}

						scanResult.style.display = 'none'
					} catch (err) {
						console.error('Scan start error:', err)
						scanResult.style.display = 'block'
						scanResult.textContent = '❌ Ошибка доступа к камере'
					}
				}

				function onScanSuccess(decodedText, decodedResult) {
					lastScannedText = decodedText
					scanResult.style.display = 'block'
					scanResult.textContent =
						'✅ Найдено: ' +
						decodedText.substring(0, 50) +
						(decodedText.length > 50 ? '…' : '')
					useScannedBtn.style.display = 'block'

					setTimeout(() => {
						if (html5QrCode) {
							html5QrCode.pause()
						}
					}, 1500)
				}

				function onScanError(error) {}

				async function stopScanner() {
					if (html5QrCode) {
						try {
							await html5QrCode.stop()
							html5QrCode = null
						} catch (e) {}
					}
					scannerOverlay.style.display = 'none'
				}

				function useScannedText() {
					if (lastScannedText) {
						qrInput.value = lastScannedText
						generateQR()
						stopScanner()
					}
				}

				async function toggleCamera() {
					currentCamera =
						currentCamera === 'environment' ? 'user' : 'environment'

					if (html5QrCode) {
						try {
							await html5QrCode.stop()
							await startScanner()
						} catch (e) {}
					}
				}

				modalCloseBtn.addEventListener('click', closeModal)
				modalOverlay.addEventListener('click', e => {
					if (e.target === modalOverlay) closeModal()
				})
				modalUseBtn.addEventListener('click', useInGenerator)
				modalShareBtn.addEventListener('click', shareFromModal)

				scanBtn.addEventListener('click', startScanner)
				scannerCloseBtn.addEventListener('click', stopScanner)
				useScannedBtn.addEventListener('click', useScannedText)
				toggleCameraBtn.addEventListener('click', toggleCamera)
				scannerOverlay.addEventListener('click', e => {
					if (e.target === scannerOverlay) stopScanner()
				})

				document.addEventListener('keydown', e => {
					if (e.key === 'Escape') {
						if (modalOverlay.style.display === 'flex') closeModal()
						if (scannerOverlay.style.display === 'flex') stopScanner()
					}
				})

				generateBtn.addEventListener('click', generateQR)
				saveBtn.addEventListener('click', saveCurrentQrToHistory)
				clearHistoryBtn.addEventListener('click', clearHistory)
				shareCurrentBtn.addEventListener('click', shareCurrent)

				document.querySelectorAll('.field').forEach(inp => {
					inp.addEventListener('keypress', e => {
						if (e.key === 'Enter') generateQR()
					})
				})

				passwordField.addEventListener('keypress', e => {
					if (e.key === 'Enter') loginBtn.click()
				})
				usernameField.addEventListener('keypress', e => {
					if (e.key === 'Enter') loginBtn.click()
				})

				checkAuth()
			})()
		</script>
	</body>
</html>
